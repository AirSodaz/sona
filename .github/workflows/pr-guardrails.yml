name: PR Guardrails

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: pr-guardrails-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Node.js setup
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint:ci

      - name: Run tests
        run: pnpm run test:ci

      - name: Run script tests
        run: pnpm run test:scripts

      - name: Run build
        run: pnpm run build:ci

  rust-backend:
    name: Rust Backend
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils libasound2-dev llvm-dev libclang-dev clang

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Enable Corepack
        run: corepack enable

      - name: Node.js setup
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone CLI
        run: cargo build -p sona-cli --release

      - name: Run core, adapters, bindings, and standalone CLI tests
        run: cargo test -p sona-core -p sona-api-server -p sona-archive -p sona-export -p sona-local-asr -p sona-media-detector -p sona-model-downloads -p sona-online-llm -p sona-online-asr -p sona-runtime-fs -p sona-webdav -p sona-ts-bind -p sona-uniffi-bind -p sona-cli

      - name: Compile Rust tests
        run: cargo test --manifest-path platforms/desktop/Cargo.toml --no-run

      - name: Run desktop entry tests
        run: cargo test --manifest-path platforms/desktop/Cargo.toml --test desktop_entry

      - name: Run preset model tests
        run: cargo test -p sona-core --test preset_models

      - name: Run API server tests
        run: cargo test --manifest-path platforms/desktop/Cargo.toml --lib app::server::tests

      - name: Install Android Rust target
        run: rustup target add aarch64-linux-android

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Run Android UniFFI Gradle smoke
        env:
          SONA_ANDROID_ABIS: arm64-v8a
        run: pnpm run verify:android-uniffi:gradle
