name: PR Guardrails

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: pr-guardrails-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint:ci

      - name: Run tests
        run: npm run test:ci

      - name: Run build
        run: npm run build:ci
