name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SHERPA_ONNX_VERSION: 1.13.2
  SHERPA_ONNX_TAG: v1.13.2

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: universal-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Node.js setup
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        shell: pwsh
        run: corepack enable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Download and extract sherpa-onnx static libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://github.com/k2-fsa/sherpa-onnx/releases/download/${SHERPA_ONNX_TAG}/sherpa-onnx-v${SHERPA_ONNX_VERSION}-linux-x64-static-lib.tar.bz2
          tar -xjf sherpa-onnx-v${SHERPA_ONNX_VERSION}-linux-x64-static-lib.tar.bz2
          echo "SHERPA_ONNX_LIB_DIR=${GITHUB_WORKSPACE}/sherpa-onnx-v${SHERPA_ONNX_VERSION}-linux-x64-static-lib/lib" >> $GITHUB_ENV

      - name: Download and extract sherpa-onnx static libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          wget https://github.com/k2-fsa/sherpa-onnx/releases/download/${SHERPA_ONNX_TAG}/sherpa-onnx-v${SHERPA_ONNX_VERSION}-osx-universal2-static-lib.tar.bz2
          tar -xjf sherpa-onnx-v${SHERPA_ONNX_VERSION}-osx-universal2-static-lib.tar.bz2
          echo "SHERPA_ONNX_LIB_DIR=${GITHUB_WORKSPACE}/sherpa-onnx-v${SHERPA_ONNX_VERSION}-osx-universal2-static-lib/lib" >> $GITHUB_ENV

      - name: Download and extract sherpa-onnx static libraries (Windows x64)
        if: runner.os == 'Windows' && matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/k2-fsa/sherpa-onnx/releases/download/$env:SHERPA_ONNX_TAG/sherpa-onnx-v$env:SHERPA_ONNX_VERSION-win-x64-static-MT-Release-lib.tar.bz2" -OutFile "sherpa-onnx-win.tar.bz2"
          tar -xjf sherpa-onnx-win.tar.bz2
          $libDir = Join-Path $env:GITHUB_WORKSPACE "sherpa-onnx-v$env:SHERPA_ONNX_VERSION-win-x64-static-MT-Release-lib\lib"
          "SHERPA_ONNX_LIB_DIR=$libDir" >> $env:GITHUB_ENV

      - name: Download and extract sherpa-onnx static libraries (Windows ARM64)
        if: runner.os == 'Windows' && matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/k2-fsa/sherpa-onnx/releases/download/$env:SHERPA_ONNX_TAG/sherpa-onnx-v$env:SHERPA_ONNX_VERSION-win-arm64-static-MT-Release-lib.tar.bz2" -OutFile "sherpa-onnx-win.tar.bz2"
          tar -xjf sherpa-onnx-win.tar.bz2
          $libDir = Join-Path $env:GITHUB_WORKSPACE "sherpa-onnx-v$env:SHERPA_ONNX_VERSION-win-arm64-static-MT-Release-lib\lib"
          "SHERPA_ONNX_LIB_DIR=$libDir" >> $env:GITHUB_ENV

      - name: Configure RUSTFLAGS
        if: runner.os != 'Windows'
        run: |
          echo "RUSTFLAGS=-L native=$SHERPA_ONNX_LIB_DIR" >> $GITHUB_ENV

      - name: Set nightly version
        shell: pwsh
        # Invariant: Nightly version uses a minor bump (minor+1) compared to the base
        # package.json version under development. This ensures that the nightly
        # prerelease tag (e.g. 0.8.0-nightly.YYYYMMDD) is semantically greater than the
        # current stable version (e.g. 0.7.4), allowing Tauri's updater to offer the upgrade.
        run: |
          $baseVersion = node -p "require('./package.json').version"
          $parts = $baseVersion -split '\.'
          $major = $parts[0]
          $minor = [int]$parts[1] + 1
          $date = (Get-Date -Format 'yyyyMMdd')
          $nightlyVersion = "${major}.${minor}.0-nightly.${date}"
          Write-Host "Nightly version: $nightlyVersion"
          node -e "const p=require('./package.json'); p.version='$nightlyVersion'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"
          node -e "const p=require('./src-tauri/tauri.conf.json'); p.version='$nightlyVersion'; require('fs').writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(p, null, 2)+'\n')"
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$nightlyVersion`"" | Set-Content src-tauri/Cargo.toml

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # The Linux matrix row builds the host triple directly (matches release.yml);
        # every other row is cross-compiled and needs --target.
        run: node scripts/tauri.js build ${{ matrix.target != 'x86_64-unknown-linux-gnu' && format('--target {0}', matrix.target) || '' }}

      - name: Rename macOS assets for architecture
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            ARCH="aarch64"
          elif [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            ARCH="x64"
          elif [[ "${{ matrix.target }}" == "universal-apple-darwin" ]]; then
            ARCH="universal"
          else
            ARCH="unknown"
          fi
          echo "Detected architecture: $ARCH"
          # Cross-target builds land under target/<target>/release/bundle; host build under target/release/bundle.
          cd $(ls -d src-tauri/target/*/release/bundle/macos/ 2>/dev/null | head -1)
          if [ -f "Sona.app.tar.gz" ]; then
            mv "Sona.app.tar.gz" "Sona_${ARCH}.app.tar.gz"
            if [ -f "Sona.app.tar.gz.sig" ]; then
                mv "Sona.app.tar.gz.sig" "Sona_${ARCH}.app.tar.gz.sig"
            fi
            echo "Renamed assets to append Arch: $ARCH"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.target }}-${{ github.sha }}
          path: |
            src-tauri/target/**/release/bundle/**
            !src-tauri/target/**/release/bundle/**/*.d

  publish:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js setup
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: nightly-artifacts
          merge-multiple: true

      - name: Generate updater-nightly.json
        shell: pwsh
        run: node scripts/generate-nightly-updater-json.js

      - name: Force-push nightly tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f nightly
          git push origin nightly --force

      - name: Publish Nightly Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: nightly-artifacts/**/*
          name: Nightly Build ${{ github.run_number }}
          omitBodyDuringUpdate: true
          prerelease: true
          replacesArtifacts: true
          tag: nightly
          token: ${{ secrets.GITHUB_TOKEN }}
