[package]
name = "sona-cli"
version.workspace = true
description = "Standalone command line interface for Sona core"
authors.workspace = true
edition.workspace = true

[dependencies]
clap = { version = "4", features = ["derive", "wrap_help"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sona-core = { path = "../../core" }
thiserror = "2.0.18"

[dev-dependencies]
tempfile = "3"
