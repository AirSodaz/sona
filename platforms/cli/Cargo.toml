[package]
name = "sona-cli"
version.workspace = true
description = "Standalone command line interface for Sona core"
authors.workspace = true
edition.workspace = true
build = "build.rs"

[dependencies]
clap = { version = "4", features = ["derive", "wrap_help"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sona-api-server = { path = "../../adapters/api_server" }
sona-local-asr = { path = "../../adapters/local_asr" }
sona-model-downloads = { path = "../../adapters/model_downloads" }
sona-runtime-fs = { path = "../../adapters/runtime_fs" }
sona-core = { path = "../../core" }
thiserror = "2.0.18"
tokio = { version = "1", features = ["rt-multi-thread", "signal", "sync"] }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = ["Win32_System_LibraryLoader"] }

[dev-dependencies]
axum = { version = "0.8", features = ["macros"] }
hex = "0.4"
sha2 = "0.11"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
